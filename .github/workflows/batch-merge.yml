name: Batch Merge Queue
on:
  workflow_dispatch: # 手動実行
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: batch-merge-queue
  cancel-in-progress: true

jobs:
  batch-merge:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'merge-queue'
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - name: Checkout main
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          ref: main

      - name: Wait for Stability (Wait for other PR labels)
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting for other potential 'merge-queue' labels to be added..."
          # 30秒待機して、連続してラベルが付与される場合に備える
          sleep 30
          
          echo "Checking if other 'Dependabot auto-merge' workflows are active..."
          # 他の Dependabot 監視が動いている場合は、それらが終わるまで最大5分待機
          for i in {1..30}; do
            ACTIVE_RUNS=$(gh api repos/${{ github.repository }}/actions/runs \
              --jq ".workflow_runs[] | select(.name == \"Dependabot auto-merge\" and (.status == \"queued\" or .status == \"in_progress\")) | .id")
            
            if [ -z "$ACTIVE_RUNS" ]; then
              echo "No active Dependabot monitoring workflows found. Ready to proceed."
              break
            fi
            
            echo "Attempt $i: Still found active monitoring workflows. Waiting 10s..."
            sleep 10
          done

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Collect PRs and Merge
        id: merge-prs
        uses: actions/github-script@v8
        with:
          script: |
            const label = 'merge-queue';
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            const targetPrs = prs.filter(pr => pr.labels.some(l => l.name === label));
            
            if (targetPrs.length === 0) {
              console.log("No PRs with label '" + label + "' found.");
              core.setOutput("result", "skip");
              return;
            }

            console.log(`Found ${targetPrs.length} PRs to merge: ${targetPrs.map(p => "#" + p.number).join(', ')}`);
            
            // Temporary branch name
            const stagingBranch = 'automation/batch-merge-staging';
            
            try {
              // Create staging branch from main
              await exec.exec('git', ['checkout', '-b', stagingBranch]);
              
              for (const pr of targetPrs) {
                console.log(`Merging PR #${pr.number} (${pr.head.ref})...`);
                // Fetch the PR branch
                await exec.exec('git', ['fetch', 'origin', `${pr.head.ref}:${pr.head.ref}`]);
                // Merge into staging
                await exec.exec('git', ['merge', '--no-ff', pr.head.ref, '-m', `Merge PR #${pr.number} into batch-integration`]);
              }
              
              console.log("All PRs merged into staging branch locally.");
              core.setOutput("result", "success");
            } catch (error) {
              core.setFailed(`Merge failed: ${error.message}`);
              core.setOutput("result", "error");
            }

      - name: Setup Node.js
        if: steps.merge-prs.outputs.result == 'success'
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.merge-prs.outputs.result == 'success'
        run: npm ci

      # --- 強化された検証ステップ ---
      
      # 1. Dependency Review
      - name: Dependency Review
        if: steps.merge-prs.outputs.result == 'success'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0

      # 2. CodeQL Analysis (JavaScript/TypeScript)
      - name: Initialize CodeQL
        if: steps.merge-prs.outputs.result == 'success'
        uses: github/codeql-action/init@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        with:
          languages: javascript, typescript

      - name: Autobuild CodeQL
        if: steps.merge-prs.outputs.result == 'success'
        uses: github/codeql-action/autobuild@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6

      - name: Perform CodeQL Analysis
        if: steps.merge-prs.outputs.result == 'success'
        uses: github/codeql-action/analyze@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6

      # 3. WASM & App Build
      - name: Setup Rust
        if: steps.merge-prs.outputs.result == 'success'
        uses: dtolnay/rust-toolchain@6d9817901c499d6b02debbb57edb38d33daa680b # stable
        with:
          toolchain: stable
          target: wasm32-unknown-unknown

      - name: Install wasm-pack
        if: steps.merge-prs.outputs.result == 'success'
        run: |
          curl -L https://github.com/rustwasm/wasm-pack/releases/download/v0.13.1/wasm-pack-v0.13.1-x86_64-unknown-linux-musl.tar.gz -o wasm-pack.tar.gz
          tar xzf wasm-pack.tar.gz
          sudo mv wasm-pack-v0.13.1-x86_64-unknown-linux-musl/wasm-pack /usr/local/bin/
          wasm-pack --version

      - name: Build WASM and App
        if: steps.merge-prs.outputs.result == 'success'
        run: |
          npm run build:wasm
          npm run build

      # 4. Deployment Test (Localhost)
      - name: Verify Deployment (test-preview-deployment)
        if: steps.merge-prs.outputs.result == 'success'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Starting Wrangler Dev Server for Verification..."
          echo "WORKER_BASE_URL=http://127.0.0.1:8787" > .dev.vars
          npx wrangler dev --remote --port 8787 --ip 127.0.0.1 > wrangler-batch.log 2>&1 &
          WPID=$!
          
          # Wait for server
          timeout 120 bash -c 'until curl -sf http://127.0.0.1:8787/personalized-education > /dev/null; do sleep 2; done' || (cat wrangler-batch.log && exit 1)
          
          echo "Verification passed! Killing wrangler ($WPID)..."
          kill $WPID

      # --- 本番反映 ---

      - name: Push to main
        if: steps.merge-prs.outputs.result == 'success'
        run: |
          echo "Pushing combined changes to main..."
          git push origin automation/batch-merge-staging:main

      - name: Cleanup Labels
        if: steps.merge-prs.outputs.result == 'success'
        uses: actions/github-script@v8
        with:
          script: |
            const label = 'merge-queue';
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });
            const targetPrs = prs.filter(pr => pr.labels.some(l => l.name === label));
            
            for (const pr of targetPrs) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                name: label,
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: "✅ Batch merge successful. Integrated into main."
              });
            }
